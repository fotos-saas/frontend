name: PhotoStack Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript compile check
        run: npx tsc --noEmit
      - name: ESLint
        run: npm run lint --if-present

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Run Vitest
        run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  file-size-check:
    name: File Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check file sizes
        run: |
          echo "Fajlmeret ellenorzes..."
          ERRORS=0

          # Check component/service files (max 500 lines)
          while IFS= read -r file; do
            lines=$(wc -l < "$file" | tr -d ' ')
            if [ "$lines" -gt 500 ]; then
              echo "TULMERET: $file ($lines sor, limit: 500)"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find src -name "*.ts" -not -name "*.spec.ts" -not -name "*.data.ts" -not -name "*.routes.ts" -not -name "*.models.ts")

          # Check data files (max 800 lines)
          while IFS= read -r file; do
            lines=$(wc -l < "$file" | tr -d ' ')
            if [ "$lines" -gt 800 ]; then
              echo "TULMERET: $file ($lines sor, limit: 800)"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find src -name "*.data.ts" -o -name "*.routes.ts" -o -name "*.models.ts")

          if [ $ERRORS -gt 0 ]; then
            echo "$ERRORS fajl meghaladja a meretkorlatot!"
            exit 1
          else
            echo "Minden fajl merete rendben!"
          fi

  security-check:
    name: Security Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check forbidden patterns
        run: |
          echo "Biztonsagi ellenorzes..."
          ERRORS=0

          # localStorage token check
          if grep -rn "localStorage\.\(get\|set\)Item.*token" src/ --include="*.ts" | grep -v ".spec.ts"; then
            echo "localStorage token tarolas! sessionStorage kell!"
            ERRORS=$((ERRORS + 1))
          fi

          # Check for debug leftovers
          if grep -rn "console\.log" src/ --include="*.ts" | grep -v ".spec.ts" | grep -v "// keep" | grep -v "logger" | head -20; then
            echo "console.log maradvanyok (nem blokkolo)"
          fi

          if [ $ERRORS -gt 0 ]; then
            exit 1
          else
            echo "Biztonsagi ellenorzes OK!"
          fi

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: true
      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            e2e/results/
            playwright-report/
