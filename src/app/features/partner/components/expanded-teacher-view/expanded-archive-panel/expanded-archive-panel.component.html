<div class="archive-panel">
  <button class="archive-panel__toggle" (click)="toggleCollapse()">
    <lucide-icon
      [name]="collapsed() ? ICONS.CHEVRON_DOWN : ICONS.CHEVRON_UP"
      [size]="18"
    />
    <span class="archive-panel__toggle-label">ISKOLA ARCHÍV</span>
    <span class="archive-panel__summary">({{ summaryText() }})</span>
  </button>

  @if (!collapsed()) {
    <div class="archive-panel__content">
      <div class="archive-panel__toolbar">
        <div class="archive-panel__search">
          <lucide-icon [name]="ICONS.SEARCH" [size]="16" class="archive-panel__search-icon" />
          <input
            type="text"
            class="archive-panel__search-input"
            placeholder="Tanár keresése..."
            [ngModel]="dataService.archiveSearchQuery()"
            (ngModelChange)="onSearchChange($event)"
          />
        </div>

        <button
          class="archive-panel__filter-btn"
          [class.archive-panel__filter-btn--active]="dataService.showOnlyMissingPhoto()"
          (click)="onMissingPhotoToggle()"
          matTooltip="Csak fotó nélküli"
        >
          <lucide-icon [name]="ICONS.IMAGE" [size]="16" />
          <span>Csak hiányzó</span>
        </button>

        <button class="archive-panel__action-btn" (click)="uploadRequested.emit()" matTooltip="Fotók feltöltése">
          <lucide-icon [name]="ICONS.UPLOAD" [size]="16" />
          <span>Feltöltés</span>
        </button>

        <button class="archive-panel__action-btn" (click)="syncRequested.emit()" matTooltip="Fotó szinkronizálás">
          <lucide-icon [name]="ICONS.REFRESH" [size]="16" />
          <span>Szinkron</span>
        </button>
      </div>

      <div class="archive-panel__grid">
        @for (teacher of filteredTeachers(); track teacher.archiveId) {
          <div class="archive-teacher" [matTooltip]="teacher.name + ' — ' + teacher.schoolName">
            <div class="archive-teacher__photo">
              @if (teacher.hasPhoto && teacher.photoThumbUrl) {
                <img [src]="teacher.photoThumbUrl" [alt]="teacher.name" loading="lazy" />
              } @else {
                <div class="archive-teacher__no-photo">
                  <lucide-icon [name]="ICONS.USER" [size]="20" />
                </div>
              }
            </div>
            <span class="archive-teacher__name">{{ teacher.name }}</span>
          </div>
        } @empty {
          <div class="archive-panel__empty">
            <span>Nincs találat</span>
          </div>
        }
      </div>
    </div>
  }
</div>
