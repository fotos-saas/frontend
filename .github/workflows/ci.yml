name: PhotoStack Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript compile check
        run: npx tsc --noEmit
        continue-on-error: true  # ⚠️ WARNING mód
      - name: ESLint
        run: npm run lint --if-present
        continue-on-error: true  # ⚠️ WARNING mód

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Run Vitest
        run: npm run test:coverage
        continue-on-error: true  # ⚠️ WARNING mód
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  file-size-check:
    name: File Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check file sizes
        run: |
          echo "📏 Fájlméret ellenőrzés..."
          OVER=0

          while IFS= read -r file; do
            lines=$(wc -l < "$file" | tr -d ' ')
            if [ "$lines" -gt 500 ]; then
              echo "⚠️ $file ($lines sor, limit: 500)"
              OVER=$((OVER + 1))
            fi
          done < <(find src -name "*.ts" -not -name "*.spec.ts" -not -name "*.data.ts" -not -name "*.routes.ts" -not -name "*.models.ts")

          while IFS= read -r file; do
            lines=$(wc -l < "$file" | tr -d ' ')
            if [ "$lines" -gt 800 ]; then
              echo "⚠️ $file ($lines sor, limit: 800)"
              OVER=$((OVER + 1))
            fi
          done < <(find src -name "*.data.ts" -o -name "*.routes.ts" -o -name "*.models.ts")

          if [ $OVER -gt 0 ]; then
            echo "::warning::$OVER fájl meghaladja a méretkorlátot"
          else
            echo "✅ Minden fájl mérete rendben!"
          fi

  security-check:
    name: Security Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check forbidden patterns
        run: |
          echo "🔒 Biztonsági ellenőrzés..."

          # localStorage token check
          LSTORAGE=$(grep -rn "localStorage\.\(get\|set\)Item.*token" src/ --include="*.ts" | grep -v ".spec.ts" || true)
          if [ -n "$LSTORAGE" ]; then
            echo "::warning::localStorage token tárolás! sessionStorage kell!"
            echo "$LSTORAGE"
          fi

          # console.log check
          CONSOLELOG=$(grep -rn "console\.log" src/ --include="*.ts" | grep -v ".spec.ts" | grep -v "// keep" | grep -v "logger" | wc -l | tr -d ' ')
          if [ "$CONSOLELOG" -gt 0 ]; then
            echo "::warning::$CONSOLELOG console.log maradvány"
          fi

          echo "✅ Biztonsági ellenőrzés kész (warnings fent)"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: true
        continue-on-error: true  # ⚠️ WARNING mód
      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            e2e/results/
            playwright-report/
