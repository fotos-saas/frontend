<div class="class-column" [class.class-column--source]="isSource()">
  <div class="class-column__header">
    <div class="class-column__header-top">
      <div class="class-column__header-info">
        <span class="class-column__school">{{ classData().schoolName }}</span>
        <span class="class-column__name">{{ classData().className }}</span>
        <span class="class-column__count">({{ filteredTeachers().length }})</span>
      </div>
      <button
        class="class-column__add-btn"
        matTooltip="Tanárok hozzáadása"
        (click)="addTeacherRequest.emit(classData().projectId)"
      >
        <lucide-icon [name]="ICONS.PLUS" [size]="14" />
      </button>
    </div>
  </div>

  <div class="class-column__list" #listRef>
    @for (teacher of filteredTeachers(); track teacher.personId) {
      <app-expanded-teacher-card
        [attr.data-person-id]="teacher.personId"
        [teacher]="teacher"
        [isHighlighted]="isHighlighted(teacher)"
        [highlightType]="getHighlightType(teacher)"
        (hover)="onTeacherHover($event)"
        (select)="onTeacherSelect($event)"
        (drop)="onTeacherDrop($event)"
        (removeOverride)="onRemoveOverride($event)"
      />
    } @empty {
      <div class="class-column__empty">
        <lucide-icon [name]="ICONS.USER" [size]="20" />
        <span>Nincs tanár</span>
      </div>
    }
  </div>
</div>
