<div class="upload-panel">
  <button class="upload-panel__toggle" (click)="toggleCollapse()">
    <lucide-icon
      [name]="collapsed() ? ICONS.CHEVRON_DOWN : ICONS.CHEVRON_UP"
      [size]="18"
    />
    <span class="upload-panel__toggle-label">FELTÖLTÉSI TERÜLET</span>
    <span class="upload-panel__summary">({{ summaryText() }})</span>
  </button>

  @if (!collapsed()) {
    <div
      class="upload-panel__content"
      [class.upload-panel__content--dragover]="isDragOver"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
    >
      @if (uploading()) {
        <div class="upload-panel__progress">
          <div class="upload-panel__progress-bar" [style.width.%]="uploadProgress()"></div>
        </div>
      }

      <input
        #fileInput
        type="file"
        accept="image/jpeg,image/png"
        multiple
        class="upload-panel__file-input"
        (change)="onFilesSelected($event)"
      />

      @if (photos().length > 0) {
        <div class="upload-panel__grid">
          @for (photo of photos(); track photo.id) {
            <div
              class="upload-photo"
              [class.upload-photo--dragging]="draggedPhoto()?.id === photo.id"
              draggable="true"
              (dragstart)="onPhotoDragStart($event, photo)"
              (dragend)="onPhotoDragEnd()"
            >
              <div class="upload-photo__image">
                <img [src]="photo.thumbUrl" [alt]="photo.filename" loading="lazy" />
                <button
                  class="upload-photo__delete"
                  (click)="deletePhoto(photo.id, $event)"
                  matTooltip="Fotó törlése"
                >
                  <lucide-icon [name]="ICONS.X" [size]="12" />
                </button>
              </div>
              <span class="upload-photo__name" [matTooltip]="photo.filename">{{ photo.iptcTitle || photo.filename }}</span>
            </div>
          }
        </div>
      } @else {
        <app-drop-zone
          [uploading]="uploading()"
          [uploadProgress]="uploadProgress()"
          accept=".jpg,.jpeg,.png"
          hint="JPG vagy PNG"
          maxSize="max. 50 kép"
          (filesSelected)="onDropZoneFiles($event)"
        />
      }
    </div>
  }
</div>

<!-- Mind törlése megerősítő dialógus -->
@if (showDeleteAllConfirm()) {
  <app-confirm-dialog
    title="Összes fotó törlése"
    [message]="'Biztosan törölni szeretnéd mind a(z) ' + photos().length + ' feltöltött fotót? Ez a művelet nem vonható vissza.'"
    confirmText="Mind törlése"
    cancelText="Mégse"
    confirmType="danger"
    (resultEvent)="onDeleteAllResult($event)"
  />
}
