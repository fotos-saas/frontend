<div class="drag-order-panel">
  <div class="drag-order-panel__header">
    <lucide-icon [name]="ICONS.GRIP" [size]="14" />
    <span>Drag & Drop sorrend</span>
    <button class="drag-order-panel__close" (click)="close.emit()" type="button">
      <lucide-icon [name]="ICONS.X" [size]="14" />
    </button>
  </div>

  <!-- Scope választó -->
  <div class="drag-order-panel__scope">
    <button
      class="drag-order-panel__scope-btn"
      [class.drag-order-panel__scope-btn--active]="scope() === 'students'"
      (click)="setScope('students')"
    >Diákok</button>
    <button
      class="drag-order-panel__scope-btn"
      [class.drag-order-panel__scope-btn--active]="scope() === 'teachers'"
      (click)="setScope('teachers')"
    >Tanárok</button>
    <button
      class="drag-order-panel__scope-btn"
      [class.drag-order-panel__scope-btn--active]="scope() === 'all'"
      (click)="setScope('all')"
    >Mind</button>
  </div>

  <!-- Drag lista -->
  <div class="drag-order-panel__list" cdkDropList (cdkDropListDropped)="onDrop($event)">
    @for (person of orderedList(); track person.id; let i = $index) {
      <div class="drag-order-panel__item" cdkDrag>
        <div class="drag-order-panel__handle" cdkDragHandle>
          <lucide-icon [name]="ICONS.GRIP" [size]="12" />
        </div>
        <span class="drag-order-panel__index">{{ i + 1 }}.</span>
        <span class="drag-order-panel__name">{{ person.name }}</span>
        @if (person.title) {
          <span class="drag-order-panel__title">{{ person.title }}</span>
        }
        <!-- Drag placeholder -->
        <div class="drag-order-panel__placeholder" *cdkDragPlaceholder></div>
      </div>
    }
    @if (orderedList().length === 0) {
      <div class="drag-order-panel__empty">Nincs személy ebben a csoportban</div>
    }
  </div>

  <!-- Mentés -->
  <div class="drag-order-panel__footer">
    <button
      class="drag-order-panel__btn"
      [disabled]="saving() || orderedList().length === 0"
      (click)="save()"
      type="button"
    >
      @if (saving()) {
        <span class="drag-order-panel__spinner"></span>
        Mentés...
      } @else {
        <lucide-icon [name]="ICONS.CHECK" [size]="14" />
        Mentés
      }
    </button>
  </div>
</div>
