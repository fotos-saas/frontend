<div class="print-shop-dashboard page-card">
  <!-- Üdvözlő fejléc -->
  <div class="welcome-section">
    <h1 class="welcome-title">Üdvözöljük, {{ partnerName() }}!</h1>
    <p class="welcome-subtitle">Nyomdai vezérlőpult</p>
  </div>

  <!-- Statisztika kártyák -->
  <div class="stats-grid">
    <a class="stat-card stat-card--link" routerLink="/print-shop/projects" [queryParams]="{status: 'in_print'}">
      <div class="stat-icon">
        <lucide-icon [name]="ICONS.PRINTER" [size]="24"></lucide-icon>
      </div>
      <div class="stat-content">
        <span class="stat-value">{{ stats().in_print }}</span>
        <span class="stat-label">Nyomdában lévő projekt</span>
      </div>
    </a>

    <div class="stat-card">
      <div class="stat-icon stat-icon--green">
        <lucide-icon [name]="ICONS.CHECK_CIRCLE" [size]="24"></lucide-icon>
      </div>
      <div class="stat-content">
        <span class="stat-value">{{ stats().done_this_month }}</span>
        <span class="stat-label">Befejezett (hónap)</span>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon stat-icon--blue">
        <lucide-icon [name]="ICONS.BUILDING" [size]="24"></lucide-icon>
      </div>
      <div class="stat-content">
        <span class="stat-value">{{ stats().connected_studios }}</span>
        <span class="stat-label">Kapcsolt stúdió</span>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon stat-icon--amber">
        <lucide-icon [name]="ICONS.CLOCK" [size]="24"></lucide-icon>
      </div>
      <div class="stat-content">
        <span class="stat-value">{{ stats().pending_requests }}</span>
        <span class="stat-label">Függő kapcsolatkérés</span>
      </div>
    </div>
  </div>
</div>
