<!-- Chrome-szeru tab bar -->
<div class="tab-bar"
     role="tablist"
     aria-label="Nyitott tabok"
     cdkDropList
     cdkDropListOrientation="horizontal"
     [cdkDropListData]="tabManager.tabs()"
     (cdkDropListDropped)="onTabDrop($event)">

  <!-- Window drag region (macOS traffic lights) -->
  <div class="drag-region"></div>

  <!-- Tab elemek -->
  @for (tab of tabManager.tabs(); track tab.id; let i = $index) {
    <div class="tab-item"
         cdkDrag
         [cdkDragData]="tab"
         role="tab"
         [id]="'tab-' + tab.id"
         [attr.aria-selected]="tab.id === tabManager.activeTabId()"
         [attr.aria-label]="tab.title"
         [attr.aria-controls]="'tabpanel-' + tab.id"
         [tabindex]="tab.id === tabManager.activeTabId() ? 0 : -1"
         [class.active]="tab.id === tabManager.activeTabId()"
         [class.pinned]="tab.isPinned"
         [class.dirty]="tab.isDirty"
         [matTooltip]="tab.title"
         [matTooltipDisabled]="!tab.isPinned"
         matTooltipPosition="below"
         (click)="tabManager.activateTab(tab.id)"
         (auxclick)="onMiddleClick($event, tab.id)"
         (contextmenu)="openContextMenu($event, tab)"
         (keydown)="onTabKeydown($event, tab.id)">

      <!-- Drag placeholder -->
      <div class="tab-drag-placeholder" *cdkDragPlaceholder></div>

      <!-- Tab ikon -->
      <lucide-icon [name]="tab.icon" [size]="14" class="tab-icon" />

      <!-- Tab cim (nem pinned eseten) -->
      @if (!tab.isPinned) {
        <span class="tab-title">{{ tab.title }}</span>
      }

      <!-- Dirty indikator -->
      @if (tab.isDirty && !tab.isPinned) {
        <span class="dirty-dot" aria-label="Mentetlen valtozasok"></span>
      }

      <!-- Bezaro gomb (nem pinned eseten) -->
      @if (!tab.isPinned) {
        <button class="tab-close"
                (click)="closeTab($event, tab.id)"
                matTooltip="Bezaras"
                aria-label="Tab bezarasa: {{ tab.title }}"
                tabindex="-1">
          <lucide-icon [name]="ICONS.X" [size]="14" />
        </button>
      }
    </div>
  }

  <!-- Uj tab gomb -->
  <button class="new-tab-btn"
          (click)="tabManager.createTab(DEFAULT_TAB_URL)"
          [disabled]="!tabManager.canCreateTab()"
          matTooltip="Uj tab (Ctrl+T)"
          aria-label="Uj tab megnyitasa">
    <lucide-icon [name]="ICONS.PLUS" [size]="16" />
  </button>

  <!-- Jobb oldali drag region -->
  <div class="drag-region-right"></div>
</div>

<!-- Kontextus menu -->
@if (contextMenuTab()) {
  <app-tab-context-menu
    [tab]="contextMenuTab()!"
    [x]="contextMenuX()"
    [y]="contextMenuY()"
    (closed)="closeContextMenu()" />
}
