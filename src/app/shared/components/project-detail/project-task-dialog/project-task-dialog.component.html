<app-dialog-wrapper
  [title]="editTask() ? (selectedType === 'task' ? 'Feladat szerkesztése' : selectedType === 'question' ? 'Kérdés szerkesztése' : 'Jegyzet szerkesztése') : (selectedType === 'task' ? 'Új feladat' : selectedType === 'question' ? 'Új kérdés' : 'Új jegyzet')"
  [icon]="ICONS.LIST_TODO"
  headerStyle="flat"
  theme="blue"
  size="md"
  [isSubmitting]="saving()"
  (closeEvent)="close.emit()"
  (submitEvent)="save()"
  (backdropClickEvent)="close.emit()">
  <div dialogBody>
    <!-- Típusválasztó -->
    <div class="type-selector">
      <label class="ps-field__label">Típus</label>
      <div class="type-selector__buttons">
        <button
          type="button"
          class="type-btn"
          [class.type-btn--active]="selectedType === 'task'"
          [class.type-btn--task]="selectedType === 'task'"
          (click)="selectedType = 'task'"
        >
          <lucide-icon [name]="ICONS.LIST_TODO" [size]="16" />
          Feladat
        </button>
        <button
          type="button"
          class="type-btn"
          [class.type-btn--active]="selectedType === 'question'"
          [class.type-btn--question]="selectedType === 'question'"
          (click)="selectedType = 'question'"
        >
          <lucide-icon [name]="ICONS.MESSAGE_CIRCLE_QUESTION" [size]="16" />
          Kérdés
        </button>
        <button
          type="button"
          class="type-btn"
          [class.type-btn--active]="selectedType === 'note'"
          [class.type-btn--note]="selectedType === 'note'"
          (click)="selectedType = 'note'"
        >
          <lucide-icon [name]="ICONS.STICKY_NOTE" [size]="16" />
          Jegyzet
        </button>
      </div>
    </div>

    <ps-input
      label="Cím"
      placeholder="Feladat címe"
      [required]="true"
      size="full"
      [(ngModel)]="title"
    />

    <ps-editor
      label="Leírás"
      placeholder="Opcionális leírás..."
      mode="basic"
      size="full"
      [maxHeight]="400"
      [(ngModel)]="description"
    />

    @if (selectedType !== 'note') {
      <ps-select
        label="Kiosztás"
        emptyLabel="Saját feladat"
        size="full"
        [options]="assigneeOptions()"
        [(ngModel)]="assignedToUserId"
      />
    }

    <!-- Meglévő csatolmányok (szerkesztésnél) -->
    @if (existingAttachments().length > 0) {
      <div class="existing-attachments">
        <label class="ps-field__label">Meglévő csatolmányok</label>
        <div class="existing-attachments__list">
          @for (att of existingAttachments(); track att.id) {
            <div class="existing-att">
              @if (att.mime_type.startsWith('image/')) {
                <img [src]="att.url" [alt]="att.original_filename" class="existing-att__thumb" />
              } @else {
                <div class="existing-att__icon">
                  <lucide-icon [name]="getFileTypeIcon(att.mime_type)" [size]="18" />
                </div>
              }
              <div class="existing-att__info">
                <span class="existing-att__name" [title]="att.original_filename">{{ att.original_filename }}</span>
                <span class="existing-att__size">{{ formatAttachmentSize(att.size_bytes) }}</span>
              </div>
              <button
                type="button"
                class="existing-att__remove"
                (click)="removeExistingAttachment(att)"
                aria-label="Csatolmány eltávolítása"
              >
                <lucide-icon [name]="ICONS.X" [size]="14" />
              </button>
            </div>
          }
        </div>
      </div>
    }

    <!-- Új csatolmányok -->
    <ps-file-upload #fileUpload
      label="Csatolmányok (max 5, max 20 MB/fájl)"
      variant="compact"
      accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.zip,.rar,.doc,.docx,.xls,.xlsx,.pptx,.txt,.csv"
      acceptLabel="Kép, PDF, ZIP, Office, TXT"
      [maxFiles]="remainingSlots()"
      [maxSizeMB]="20"
      [multiple]="true"
      dropzoneText="Húzd ide a fájlokat, vagy kattints a tallózáshoz"
      dropzoneHint="Ctrl+V beillesztés is működik"
      (ngModelChange)="onFilesChanged($event)"
      [ngModel]="newAttachments()"
      (uploadError)="onUploadError($event)"
    />
  </div>

  <div dialogFooter>
    <button class="btn btn--outline" (click)="close.emit()">Mégse</button>
    <button
      class="btn btn--primary"
      [disabled]="saving() || !title.trim()"
      (click)="save()">
      @if (saving()) {
        <lucide-icon [name]="ICONS.LOADER" [size]="16" class="spin" />
      }
      {{ editTask() ? 'Mentés' : 'Létrehozás' }}
    </button>
  </div>
</app-dialog-wrapper>
