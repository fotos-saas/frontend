<app-dialog-wrapper
  title="Újranyomtatás kérése"
  [icon]="ICONS.REPEAT_2"
  theme="amber"
  size="md"
  headerStyle="flat"
  [isSubmitting]="isSubmitting()"
  (closeEvent)="close.emit()"
>
  <div dialogBody>
    <div class="form-group">
      <label>Mi változott? <span class="required">*</span></label>
      <textarea
        rows="3"
        placeholder="Mi változott?"
        [ngModel]="message()"
        (ngModelChange)="message.set($event)"
      ></textarea>
    </div>

    <div class="form-group">
      <label>Példányszám <span class="optional">(opcionális)</span></label>
      <input
        type="number"
        [min]="1"
        [max]="9999"
        [ngModel]="printCopies()"
        (ngModelChange)="printCopies.set($event)"
      />
    </div>

    <div class="form-group">
      <label>Határidő <span class="optional">(opcionális)</span></label>
      <input
        type="date"
        [min]="today"
        [ngModel]="printDeadline()"
        (ngModelChange)="printDeadline.set($event)"
      />
    </div>

    <div class="form-group">
      <label class="checkbox-label">
        <input
          type="checkbox"
          [ngModel]="isUrgent()"
          (ngModelChange)="isUrgent.set($event)"
        />
        <lucide-icon [name]="ICONS.FLAME" [size]="16" />
        Sürgős megrendelés
      </label>
    </div>
  </div>

  <div dialogFooter>
    <button class="btn btn--secondary" (click)="close.emit()">Mégsem</button>
    <button class="btn btn--warning" (click)="onSubmit()" [disabled]="!canSubmit || isSubmitting()">
      <lucide-icon [name]="ICONS.REPEAT_2" [size]="16" />
      Újranyomtatás kérése
    </button>
  </div>
</app-dialog-wrapper>
